# ── SellerVision AI — Render.com Blueprint ───────────────────
# https://render.com/docs/blueprint-spec
#
# Deploy: connect your GitHub repo in the Render dashboard,
# then select "Blueprint" — Render reads this file and creates
# all services + databases automatically.
#
# After deploy, set the following environment vars in the dashboard:
#   SECRET_KEY, CLERK_SECRET_KEY, ANTHROPIC_API_KEY,
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
#   NEXT_PUBLIC_API_URL (= https://<api-service-name>.onrender.com)
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY

databases:
  - name: sellervision-db
    databaseName: sellervision
    user: sellervision
    plan: starter            # free tier; upgrade to standard for prod

services:
  # ── FastAPI backend ────────────────────────────────────────
  - type: web
    name: sellervision-api
    runtime: python
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --no-access-log
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: sellervision-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sellervision-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: sellervision-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: sellervision-redis
          type: redis
          property: connectionString
      # Set these manually after deploy:
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false   # https://<sellervision-frontend>.onrender.com (or custom domain)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_STARTER_PRICE_ID
        sync: false
      - key: STRIPE_PROFESSIONAL_PRICE_ID
        sync: false
      - key: STRIPE_BUSINESS_PRICE_ID
        sync: false
      - key: STRIPE_AGENCY_PRICE_ID
        sync: false
      - key: CORS_ORIGINS
        sync: false   # e.g. ["https://yourfrontend.onrender.com"]
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false   # e.g. "SellerVision AI <hello@yourdomain.com>"
      - key: EMAIL_REPLY_TO
        sync: false   # e.g. support@yourdomain.com
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: SENTRY_PROFILES_SAMPLE_RATE
        value: "0.1"
      - key: ADMIN_SECRET_KEY
        sync: false   # generate a long random string; empty = admin panel disabled

  # ── Next.js frontend ───────────────────────────────────────
  - type: web
    name: sellervision-frontend
    runtime: node
    plan: starter
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Set after API service deploys — value = https://<sellervision-api>.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false
      # Set these manually after deploy:
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      # Build-time only — for source map uploads (set in Render build env, not runtime):
      - key: SENTRY_AUTH_TOKEN
        sync: false
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false

  # ── Celery worker ──────────────────────────────────────────
  - type: worker
    name: sellervision-celery
    runtime: python
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.tasks worker --loglevel=info --concurrency=2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        fromService:
          name: sellervision-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: sellervision-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sellervision-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: sellervision-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: sellervision-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

  # ── Celery Beat scheduler ─────────────────────────────────
  # Separate from the worker so only ONE beat instance ever runs.
  # If the worker service also ran beat, you'd get duplicate scheduled tasks.
  - type: worker
    name: sellervision-celery-beat
    runtime: python
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.tasks beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        fromService:
          name: sellervision-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: sellervision-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sellervision-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: sellervision-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: sellervision-redis
          type: redis
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false

  # ── Managed Redis ──────────────────────────────────────────
  - type: redis
    name: sellervision-redis
    plan: starter
    ipAllowList: []              # restrict to internal Render network only
