version: "3.9"

# ──────────────────────────────────────────────────────────────
#  SellerVision AI — Production Docker Compose
#  Services: postgres · redis · backend (FastAPI) · frontend (Next.js) · nginx
#  Usage:
#    docker compose up -d          # start all
#    docker compose logs -f        # tail logs
#    docker compose down -v        # stop + remove volumes (DANGER: deletes DB)
# ──────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sellervision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sellervision}
      POSTGRES_DB: ${POSTGRES_DB:-sellervision}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sellervision}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend (FastAPI / uvicorn) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sellervision}:${POSTGRES_PASSWORD:-sellervision}@postgres:5432/${POSTGRES_DB:-sellervision}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal
      - external

  # ── Celery Worker ───────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=4 -Q celery,priority
    env_file: ./backend/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sellervision}:${POSTGRES_PASSWORD:-sellervision}@postgres:5432/${POSTGRES_DB:-sellervision}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend (Next.js standalone) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./frontend/.env.production
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://yourdomain.com}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal
      - external

  # ── nginx (reverse proxy + SSL termination) ─────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # mount your SSL certs here
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - external

volumes:
  postgres_data:
  redis_data:
  nginx_cache:

networks:
  internal:
    internal: true   # backend/db traffic never touches the host
  external:
    driver: bridge
