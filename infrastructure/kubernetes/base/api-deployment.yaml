apiVersion: apps/v1
kind: Deployment
metadata:
  name: sellervision-api
  namespace: sellervision
  labels:
    app: sellervision-api
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sellervision-api
  template:
    metadata:
      labels:
        app: sellervision-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: sellervision/api:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          envFrom:
            - secretRef:
                name: sellervision-secrets
            - configMapRef:
                name: sellervision-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: sellervision-api
---
apiVersion: v1
kind: Service
metadata:
  name: sellervision-api
  namespace: sellervision
spec:
  selector:
    app: sellervision-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sellervision-api-hpa
  namespace: sellervision
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sellervision-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
