apiVersion: apps/v1
kind: Deployment
metadata:
  name: sellervision-frontend
  namespace: sellervision
  labels:
    app: sellervision-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sellervision-frontend
  template:
    metadata:
      labels:
        app: sellervision-frontend
    spec:
      containers:
        - name: frontend
          image: sellervision/frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          envFrom:
            - configMapRef:
                name: sellervision-frontend-config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: sellervision-frontend
---
apiVersion: v1
kind: Service
metadata:
  name: sellervision-frontend
  namespace: sellervision
spec:
  selector:
    app: sellervision-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sellervision-frontend-hpa
  namespace: sellervision
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sellervision-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
