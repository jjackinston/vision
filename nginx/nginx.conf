# ── SellerVision AI — nginx reverse proxy ─────────────────────
# Routes:
#   /api/*          → FastAPI backend (port 8000)
#   /stripe/*       → FastAPI backend (Stripe webhooks, raw body preserved)
#   /health         → FastAPI backend health check
#   /*              → Next.js frontend (port 3000)
# SSL terminates here; internal traffic is plain HTTP.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Rate limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Upstream pools ────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;   # ← set your domain

        # SSL — place fullchain.pem and privkey.pem in ./nginx/ssl/
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ──────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── Stripe webhooks (raw body required) ───────────────
        location /stripe {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Stripe needs raw body for signature verification
            proxy_request_buffering off;
            client_max_body_size 1m;
        }

        # ── FastAPI backend ───────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            client_max_body_size 10m;
        }

        # ── Backend health + docs (no rate limit) ────────────
        location ~ ^/(health|docs|redoc|openapi.json)$ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── SSE (Agent Chat streaming) ────────────────────────
        location /api/v1/agents/chat {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            # SSE needs long timeouts and no buffering
            proxy_read_timeout 300s;
            proxy_buffering    off;
            proxy_cache        off;
            add_header         Cache-Control "no-cache";
            add_header         X-Accel-Buffering "no";
        }

        # ── Next.js static assets (long cache) ───────────────
        location /_next/static/ {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            add_header         Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Next.js frontend (everything else) ───────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
